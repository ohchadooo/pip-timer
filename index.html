<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Problem PiP Timer</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111827;
      color: #f9fafb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      width: min(760px, calc(100vw - 28px));
      padding: 28px;
      border-radius: 20px;
      background: #1f2937;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
    }

    .row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    label {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
      color: #d1d5db;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #4b5563;
      border-radius: 12px;
      background: #111827;
      color: #f9fafb;
      font-size: 18px;
      outline: none;
    }

    input:focus { border-color: #60a5fa; }

    button {
      width: 100%;
      padding: 13px;
      border: 0;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #openPipBtn { background: #7c3aed; }
    #openPipBtn:hover:not(:disabled) { background: #6d28d9; }

    #startBtn { background: #2563eb; }
    #startBtn:hover:not(:disabled) { background: #1d4ed8; }

    #pauseBtn { background: #d97706; }
    #pauseBtn:hover:not(:disabled) { background: #b45309; }

    #resetBtn { background: #4b5563; }
    #resetBtn:hover:not(:disabled) { background: #374151; }

    #deleteBtn { background: #991b1b; }
    #deleteBtn:hover:not(:disabled) { background: #7f1d1d; }

    #exportBtn { background: #0891b2; }
    #exportBtn:hover:not(:disabled) { background: #0e7490; }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .record-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .sub {
      margin-top: 12px;
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.5;
    }

    canvas {
      width: 100%;
      margin-top: 18px;
      border-radius: 16px;
      background: #030712;
    }

    video {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .records {
      margin-top: 22px;
      border-top: 1px solid #374151;
      padding-top: 18px;
    }

    .records h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .table-wrap {
      max-height: 260px;
      overflow: auto;
      border: 1px solid #374151;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #374151;
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #111827;
      color: #d1d5db;
      z-index: 1;
    }

    td {
      color: #e5e7eb;
    }

    .record-check {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .empty {
      padding: 18px;
      color: #9ca3af;
      font-size: 13px;
    }

    @media (max-width: 680px) {
      .row {
        flex-direction: column;
      }

      .button-grid,
      .record-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>문제별 PiP 타이머</h1>

    <div class="row">
      <label>
        문제명 / 번호
        <input id="problemInput" type="text" placeholder="예: BOJ 13511 트리와 쿼리 2" />
      </label>
    </div>

    <div class="row">
      <label>
        시간
        <input id="hours" type="number" min="0" max="99" value="1" />
      </label>

      <label>
        분
        <input id="minutes" type="number" min="0" max="59" value="0" />
      </label>
    </div>

    <button id="openPipBtn">PiP 열기</button>

    <div class="button-grid">
      <button id="startBtn">시작</button>
      <button id="pauseBtn" disabled>일시정지</button>
      <button id="resetBtn">초기화</button>
    </div>

    <p id="status" class="sub">
      문제명을 입력하고 시작하면 기록이 자동 생성됨. 타이머가 움직이는 동안 기록도 같이 갱신됨.
    </p>

    <canvas id="timerCanvas" width="960" height="540"></canvas>
    <video id="pipVideo" muted playsinline></video>

    <section class="records">
      <h2>기록</h2>
      <div id="recordsView"></div>

      <div class="record-actions">
        <button id="deleteBtn">삭제</button>
        <button id="exportBtn">CSV 내보내기</button>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "problem_pip_timer_records_v1";

    const problemInput = document.getElementById("problemInput");
    const hoursInput = document.getElementById("hours");
    const minutesInput = document.getElementById("minutes");

    const openPipBtn = document.getElementById("openPipBtn");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const exportBtn = document.getElementById("exportBtn");

    const statusEl = document.getElementById("status");
    const recordsView = document.getElementById("recordsView");

    const canvas = document.getElementById("timerCanvas");
    const ctx = canvas.getContext("2d");
    const video = document.getElementById("pipVideo");

    let stream = null;
    let rafId = null;

    let totalMs = 60 * 60 * 1000;
    let remainingMs = totalMs;
    let endAt = 0;

    let running = false;
    let paused = false;

    let activeProblem = "";
    let activeProblemKey = "";
    let startedAtText = "";

    let selectedKeys = new Set();
    let lastRenderedSecond = null;
    let audioCtx = null;

    function clampInt(value, min, max) {
      const n = Math.trunc(Number(value) || 0);
      return Math.min(max, Math.max(min, n));
    }

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function formatTime(ms) {
      const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      return `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
    }

    function formatDate(date = new Date()) {
      const y = date.getFullYear();
      const mo = pad2(date.getMonth() + 1);
      const d = pad2(date.getDate());
      const h = pad2(date.getHours());
      const mi = pad2(date.getMinutes());
      const s = pad2(date.getSeconds());
      return `${y}-${mo}-${d} ${h}:${mi}:${s}`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeProblemKey(problem) {
      return String(problem || "")
        .trim()
        .replace(/\s+/g, " ")
        .toLowerCase();
    }

    function hasTypedProblemName() {
      return problemInput.value.trim().length > 0;
    }

    function getProblemName() {
      return problemInput.value.trim() || "이름 없는 문제";
    }

    function getInputDurationMs() {
      const hours = clampInt(hoursInput.value, 0, 99);
      const minutes = clampInt(minutesInput.value, 0, 59);

      hoursInput.value = hours;
      minutesInput.value = minutes;

      return (hours * 3600 + minutes * 60) * 1000;
    }

    function getRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function setRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function getRecordKey(record) {
      return normalizeProblemKey(record.problemKey || record.problem);
    }

    function makeCurrentRecord(status) {
      const elapsedMs = Math.max(0, totalMs - remainingMs);

      return {
        savedAt: formatDate(),
        problem: activeProblem,
        problemKey: activeProblemKey,
        startedAt: startedAtText || "-",
        target: formatTime(totalMs),
        elapsed: formatTime(elapsedMs),
        remaining: formatTime(remainingMs),
        status
      };
    }

    function upsertCurrentRecord(status, shouldRender = true) {
      if (!activeProblemKey) return false;

      const record = makeCurrentRecord(status);
      const records = getRecords();

      const filtered = records.filter((r) => getRecordKey(r) !== activeProblemKey);
      filtered.push(record);

      setRecords(filtered);

      if (shouldRender) {
        renderRecords();
      }

      return true;
    }

    function deleteRecordByKey(problemKey) {
      if (!problemKey) return false;

      const records = getRecords();
      const next = records.filter((r) => getRecordKey(r) !== problemKey);

      if (next.length === records.length) return false;

      selectedKeys.delete(problemKey);
      setRecords(next);
      renderRecords();

      return true;
    }

    function renderRecords() {
      const records = getRecords();

      if (records.length === 0) {
        recordsView.innerHTML = '<div class="empty">아직 저장된 기록 없음.</div>';
        return;
      }

      const rows = records.slice().reverse().map((r) => {
        const key = getRecordKey(r);
        const checked = selectedKeys.has(key) ? "checked" : "";

        return `
          <tr>
            <td>
              <input type="checkbox" class="record-check" data-record-key="${escapeHtml(key)}" ${checked}>
            </td>
            <td>${escapeHtml(r.savedAt || "-")}</td>
            <td>${escapeHtml(r.problem || "-")}</td>
            <td>${escapeHtml(r.target || "-")}</td>
            <td>${escapeHtml(r.elapsed || "-")}</td>
            <td>${escapeHtml(r.remaining || "-")}</td>
            <td>${escapeHtml(r.status || r.result || "-")}</td>
          </tr>
        `;
      }).join("");

      recordsView.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>선택</th>
                <th>갱신 시각</th>
                <th>문제</th>
                <th>목표</th>
                <th>사용</th>
                <th>남은 시간</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;

      recordsView.querySelectorAll(".record-check").forEach((box) => {
        box.addEventListener("change", () => {
          const key = box.dataset.recordKey;

          if (box.checked) {
            selectedKeys.add(key);
          } else {
            selectedKeys.delete(key);
          }
        });
      });
    }

    function deleteSelectedRecords() {
      const checked = [...recordsView.querySelectorAll(".record-check:checked")]
        .map((box) => box.dataset.recordKey);

      if (checked.length === 0) {
        statusEl.textContent = "선택된 기록이 없음.";
        return;
      }

      const deletingActive = activeProblemKey && checked.includes(activeProblemKey);

      if (deletingActive) {
        const ok = confirm("현재 진행 중인 문제 기록이 포함되어 있음. 삭제하면 타이머도 초기화됨. 삭제할까요?");
        if (!ok) return;
      } else {
        const ok = confirm(`선택한 기록 ${checked.length}개를 삭제할까요?`);
        if (!ok) return;
      }

      const deleteSet = new Set(checked);
      const next = getRecords().filter((r) => !deleteSet.has(getRecordKey(r)));

      setRecords(next);

      for (const key of deleteSet) {
        selectedKeys.delete(key);
      }

      if (deletingActive) {
        cancelAnimationFrame(rafId);
        running = false;
        paused = false;
        activeProblemKey = "";
        activeProblem = hasTypedProblemName() ? getProblemName() : "";
        startedAtText = "";
        totalMs = getInputDurationMs() || 60 * 60 * 1000;
        remainingMs = totalMs;
        setControls();
        drawTimer(remainingMs, "ready");
      }

      renderRecords();

      statusEl.textContent = `기록 ${checked.length}개 삭제됨.`;
    }

    function exportCsv() {
      const records = getRecords();

      if (records.length === 0) {
        statusEl.textContent = "내보낼 기록이 없음.";
        return;
      }

      const headers = ["savedAt", "problem", "startedAt", "target", "elapsed", "remaining", "status"];

      const escapeCsv = (value) => {
        const s = String(value ?? "");
        return `"${s.replaceAll('"', '""')}"`;
      };

      const csv = [
        headers.join(","),
        ...records.map((r) => headers.map((h) => escapeCsv(r[h])).join(","))
      ].join("\n");

      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "problem_timer_records.csv";
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
      statusEl.textContent = "CSV 파일로 내보냄.";
    }

    function roundRect(ctx, x, y, width, height, radius) {
      if (width <= 0 || height <= 0) return;

      const r = Math.min(radius, width / 2, height / 2);

      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function fitText(text, maxWidth, startSize, minSize, weight = "600", family = "system-ui, sans-serif") {
      let size = startSize;

      while (size > minSize) {
        ctx.font = `${weight} ${size}px ${family}`;
        if (ctx.measureText(text).width <= maxWidth) break;
        size -= 2;
      }

      return `${weight} ${size}px ${family}`;
    }

    function drawTimer(remainMs, mode = "ready") {
      const w = canvas.width;
      const h = canvas.height;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#030712";
      ctx.fillRect(0, 0, w, h);

      let label = "READY";
      let mainColor = "#f9fafb";
      let barColor = "#60a5fa";

      if (mode === "running") {
        label = "REMAINING TIME";
      } else if (mode === "paused") {
        label = "PAUSED";
        mainColor = "#fbbf24";
        barColor = "#f59e0b";
      } else if (mode === "finished") {
        label = "TIME IS UP";
        mainColor = "#f87171";
        barColor = "#ef4444";
      }

      const problem = activeProblem || getProblemName();

      ctx.textAlign = "center";

      ctx.fillStyle = "#d1d5db";
      ctx.font = fitText(problem, w - 120, 42, 24, "700");
      ctx.fillText(problem, w / 2, 78);

      ctx.fillStyle = "#9ca3af";
      ctx.font = "500 34px system-ui, sans-serif";
      ctx.fillText(label, w / 2, 132);

      ctx.fillStyle = mainColor;
      ctx.font = "800 140px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      ctx.fillText(formatTime(remainMs), w / 2, 300);

      const barX = 120;
      const barY = 386;
      const barW = w - 240;
      const barH = 34;

      ctx.fillStyle = "#1f2937";
      roundRect(ctx, barX, barY, barW, barH, 17);
      ctx.fill();

      const ratio = totalMs > 0 ? Math.max(0, Math.min(1, remainMs / totalMs)) : 0;

      ctx.fillStyle = barColor;
      roundRect(ctx, barX, barY, barW * ratio, barH, 17);
      ctx.fill();

      const elapsed = formatTime(Math.max(0, totalMs - remainMs));
      ctx.fillStyle = "#6b7280";
      ctx.font = "400 28px system-ui, sans-serif";
      ctx.fillText(`USED ${elapsed}`, w / 2, 475);
    }

    function setControls() {
      pauseBtn.disabled = !(running || paused);
      pauseBtn.textContent = paused ? "계속" : "일시정지";
    }

    function syncLiveRecord(status) {
      if (!activeProblemKey) return;

      const sec = Math.ceil(Math.max(0, remainingMs) / 1000);

      if (sec === lastRenderedSecond && status === "진행 중") {
        return;
      }

      lastRenderedSecond = sec;
      upsertCurrentRecord(status, true);
    }

    function loop() {
      if (!running) return;

      remainingMs = endAt - performance.now();

      if (remainingMs <= 0) {
        remainingMs = 0;
        running = false;
        paused = false;

        cancelAnimationFrame(rafId);
        drawTimer(0, "finished");
        setControls();

        syncLiveRecord("시간 종료");
        beep();

        statusEl.textContent = activeProblemKey
          ? "타이머 종료. 기록이 최종 상태로 갱신됨."
          : "타이머 종료.";
        return;
      }

      drawTimer(remainingMs, "running");
      syncLiveRecord("진행 중");

      rafId = requestAnimationFrame(loop);
    }

    async function ensureAudioReady() {
      try {
        if (!audioCtx) {
          audioCtx = new AudioContext();
        }

        if (audioCtx.state === "suspended") {
          await audioCtx.resume();
        }
      } catch {
        // 오디오 실패해도 타이머 자체는 계속 동작
      }
    }

    function beep() {
      try {
        if (!audioCtx) return;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.value = 880;

        gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.25, audioCtx.currentTime + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.75);
      } catch {
        // 무시
      }
    }

    async function openPiP() {
      if (!("pictureInPictureEnabled" in document) || !document.pictureInPictureEnabled) {
        statusEl.textContent = "이 브라우저는 Picture-in-Picture API를 지원하지 않음.";
        return;
      }

      if (!stream) {
        stream = canvas.captureStream(30);
        video.srcObject = stream;
      }

      try {
        await video.play();

        if (document.pictureInPictureElement !== video) {
          await video.requestPictureInPicture();
        }

        statusEl.textContent = "PiP 창 열림. 시작 버튼을 누르면 타이머가 진행됨.";
      } catch (err) {
        statusEl.textContent = "PiP 실행 실패: 브라우저 권한 또는 지원 여부를 확인해야 함.";
        console.error(err);
      }
    }

    async function startTimer() {
      const durationMs = getInputDurationMs();

      if (durationMs <= 0) {
        statusEl.textContent = "최소 1분 이상 설정해야 함.";
        return;
      }

      await ensureAudioReady();

      cancelAnimationFrame(rafId);

      activeProblem = getProblemName();
      activeProblemKey = hasTypedProblemName() ? normalizeProblemKey(activeProblem) : "";
      startedAtText = formatDate();

      totalMs = durationMs;
      remainingMs = durationMs;
      endAt = performance.now() + remainingMs;

      running = true;
      paused = false;
      lastRenderedSecond = null;

      setControls();
      drawTimer(remainingMs, "running");

      if (activeProblemKey) {
        upsertCurrentRecord("진행 중", true);
        statusEl.textContent = `타이머 시작 + 기록 실시간 갱신: ${activeProblem}`;
      } else {
        statusEl.textContent = "타이머 실행 중. 문제명을 입력하지 않아서 기록은 저장하지 않음.";
      }

      loop();
    }

    function togglePause() {
      if (running) {
        remainingMs = Math.max(0, endAt - performance.now());
        running = false;
        paused = true;

        cancelAnimationFrame(rafId);
        drawTimer(remainingMs, "paused");
        syncLiveRecord("일시정지");

        statusEl.textContent = "일시정지됨. 기록도 일시정지 상태로 갱신됨.";
        setControls();
        return;
      }

      if (paused) {
        endAt = performance.now() + remainingMs;
        running = true;
        paused = false;
        lastRenderedSecond = null;

        drawTimer(remainingMs, "running");
        syncLiveRecord("진행 중");

        statusEl.textContent = "다시 진행 중.";
        setControls();
        loop();
      }
    }

    function resetTimer() {
      cancelAnimationFrame(rafId);

      const keyToDelete = activeProblemKey || (hasTypedProblemName() ? normalizeProblemKey(getProblemName()) : "");
      const deleted = deleteRecordByKey(keyToDelete);

      totalMs = getInputDurationMs();
      if (totalMs <= 0) {
        totalMs = 60 * 60 * 1000;
      }

      remainingMs = totalMs;
      endAt = 0;

      running = false;
      paused = false;
      activeProblem = hasTypedProblemName() ? getProblemName() : "";
      activeProblemKey = "";
      startedAtText = "";
      lastRenderedSecond = null;

      drawTimer(remainingMs, "ready");
      setControls();
      renderRecords();

      statusEl.textContent = deleted
        ? "초기화됨. 해당 문제 기록도 삭제됨."
        : "초기화됨.";
    }

    openPipBtn.addEventListener("click", openPiP);
    startBtn.addEventListener("click", startTimer);
    pauseBtn.addEventListener("click", togglePause);
    resetBtn.addEventListener("click", resetTimer);
    deleteBtn.addEventListener("click", deleteSelectedRecords);
    exportBtn.addEventListener("click", exportCsv);

    problemInput.addEventListener("input", () => {
      if (!running && !paused) {
        activeProblem = hasTypedProblemName() ? getProblemName() : "";
        drawTimer(remainingMs, "ready");
      }
    });

    hoursInput.addEventListener("input", () => {
      if (!running && !paused) {
        totalMs = getInputDurationMs() || 60 * 60 * 1000;
        remainingMs = totalMs;
        drawTimer(remainingMs, "ready");
      }
    });

    minutesInput.addEventListener("input", () => {
      if (!running && !paused) {
        totalMs = getInputDurationMs() || 60 * 60 * 1000;
        remainingMs = totalMs;
        drawTimer(remainingMs, "ready");
      }
    });

    video.addEventListener("leavepictureinpicture", () => {
      if (running) {
        statusEl.textContent = "PiP 창은 닫혔지만 타이머는 페이지에서 계속 동작 중.";
      } else {
        statusEl.textContent = "PiP 창 닫힘.";
      }
    });

    renderRecords();
    totalMs = getInputDurationMs() || 60 * 60 * 1000;
    remainingMs = totalMs;
    drawTimer(remainingMs, "ready");
    setControls();
  </script>
</body>
</html>
